name: Test SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node SDK tests
        working-directory: sdk/node
        run: |
          npm ci
          npm test

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python SDK tests
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest

      - name: Python lint and typing
        working-directory: sdk/python
        run: |
          ruff check .
          mypy --strict vella/
