name: Lint Schemas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-json-and-schemas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Validate JSON and schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          roots = [Path("spec/schemas"), Path("test-vectors"), Path("examples")]
          json_files = []
          for root in roots:
            if root.exists():
              json_files.extend(sorted(root.rglob("*.json")))

          if not json_files:
            raise SystemExit("No JSON files found to validate")

          for path in json_files:
            with path.open("r", encoding="utf-8") as handle:
              json.load(handle)

          for path in sorted(Path("spec/schemas").glob("*.json")):
            with path.open("r", encoding="utf-8") as handle:
              schema = json.load(handle)
            Draft202012Validator.check_schema(schema)

          print(f"Validated {len(json_files)} JSON files and schema compliance checks passed")
          PY
